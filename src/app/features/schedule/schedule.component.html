<div class="min-h-screen bg-[var(--surface-1)] text-white">
  <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6">

    <!-- Header -->
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
      <h1 class="flex items-center gap-2 text-2xl font-bold sm:text-3xl">
        <i class="fa-solid fa-calendar text-xl text-yellow-400 sm:text-2xl" aria-hidden="true"></i>
        My Egypt Schedule
      </h1>

      <button
        type="button"
        aria-label="Export schedule"
        class="flex w-full min-h-[44px] items-center justify-center gap-2 rounded-lg border border-white/10 bg-white/5 px-4 py-2 text-sm text-white transition hover:bg-white/10 focus:outline-none focus:ring-2 focus:ring-yellow-500 sm:w-auto sm:text-base"
      >
        <i class="fa-solid fa-download text-sm sm:text-base" aria-hidden="true"></i>
        Export
      </button>
    </div>

    <!-- Stats -->
    <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
      <div class="rounded-[var(--radius-lg)] border border-white/10 bg-[var(--surface-2)] p-4 text-center">
        <p class="text-xs text-zinc-300">Total Activities</p>
        <p class="mt-2 text-2xl font-bold text-yellow-400">{{ totals.count }}</p>
      </div>

      <div class="rounded-[var(--radius-lg)] border border-white/10 bg-[var(--surface-2)] p-4 text-center">
        <p class="text-xs text-zinc-300">Total Duration</p>
        <p class="mt-2 text-2xl font-bold text-yellow-400">{{ totals.duration }}</p>
      </div>

      <div class="rounded-[var(--radius-lg)] border border-white/10 bg-[var(--surface-2)] p-4 text-center sm:col-span-2 lg:col-span-1">
        <p class="text-xs text-zinc-300">Total Cost</p>
        <p class="mt-2 text-2xl font-bold text-yellow-400">{{ totals.cost }}</p>
      </div>
    </div>

    <!-- Schedule items (single, responsive list) -->
    <div class="mt-6">
      @if (activities().length > 0) {
        <div class="overflow-hidden rounded-2xl lg:border lg:border-white/10 lg:bg-[var(--surface-2)]">
          <!-- Desktop table header -->
          <div
            class="hidden grid-cols-10 gap-4 border-b border-white/10 px-4 py-3 text-[11px] uppercase tracking-wide text-yellow-500 lg:grid"
          >
            <span>Time</span>
            <span class="col-span-2">Activity</span>
            <span>Location</span>
            <span>Duration</span>
            <span>Cost</span>
            <span>Crowd Level</span>
            <span>ID Required</span>
            <span>Booking</span>
            <span>Actions</span>
          </div>

          <!-- One @for loop renders both desktop rows and mobile cards -->
          <div class="space-y-4 lg:space-y-0">
            @for (item of activities(); track item.id) {
              <app-schedule-item [item]="item" />
            }
          </div>

          <!-- Add button -->
          <div class="mt-4 lg:mt-0 lg:p-4">
            <button
              type="button"
              aria-label="Add new activity"
              class="flex w-full min-h-[44px] items-center justify-center gap-2 rounded-lg bg-yellow-400 px-4 py-3 text-sm font-bold text-black transition hover:bg-yellow-300 focus:outline-none focus:ring-2 focus:ring-yellow-500 sm:w-auto"
            >
              <i class="fa-solid fa-plus" aria-hidden="true"></i>
              Add New Activity
            </button>
          </div>
        </div>
      } @else {
        <app-empty-state
          icon="fa-regular fa-calendar"
          title="No scheduled activities yet"
          message="Add activities from the catalog to start planning your Egypt trip."
        />
      }
    </div>
  </div>
</div>
